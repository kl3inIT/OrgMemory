spring:
  application:
    name: orgmemory-api
  ai:
    model:
      chat: ${ORGMEMORY_AI_MODEL_CHAT:none}
      embedding: ${ORGMEMORY_AI_MODEL_EMBEDDING:none}
    openai:
      api-key: ${OPENAI_API_KEY:${ORGMEMORY_OPENAI_API_KEY:}}
      chat:
        model: ${ORGMEMORY_OPENAI_MODEL:gpt-5.6-sol}
      embedding:
        model: ${ORGMEMORY_OPENAI_EMBEDDING_MODEL:text-embedding-3-large}
        dimensions: ${ORGMEMORY_OPENAI_EMBEDDING_DIMENSIONS:1536}
  config:
    import: optional:file:.env[.properties],optional:file:../../.env[.properties],optional:file:.openfga.local.properties,optional:file:../../.openfga.local.properties
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${ORGMEMORY_DB_URL:jdbc:postgresql://localhost:55432/orgmemory}
    username: ${ORGMEMORY_DB_USER:orgmemory}
    password: ${ORGMEMORY_DB_PASSWORD:orgmemory}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    problemdetails:
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ORGMEMORY_OIDC_ISSUER_URI:http://localhost:8180/realms/orgmemory}
  session:
    timeout: ${ORGMEMORY_WEB_SESSION_TIMEOUT:8h}
    jdbc:
      initialize-schema: never
  servlet:
    multipart:
      max-file-size: ${ORGMEMORY_MAX_UPLOAD_SIZE:25MB}
      max-request-size: ${ORGMEMORY_MAX_UPLOAD_SIZE:25MB}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

orgmemory:
  assistant:
    heartbeat-interval: ${ORGMEMORY_ASSISTANT_HEARTBEAT_INTERVAL:15s}
    turn-timeout: ${ORGMEMORY_ASSISTANT_TURN_TIMEOUT:2m}
  ai:
    gateways:
      openai:
        display-name: OpenAI
        base-url: ${ORGMEMORY_OPENAI_BASE_URL:https://api.openai.com/v1}
        api-key: ${OPENAI_API_KEY:${ORGMEMORY_OPENAI_API_KEY:}}
        capabilities: [CHAT, EMBEDDING]
        timeout: ${ORGMEMORY_AI_GATEWAY_TIMEOUT:60s}
    routes:
      assistant-chat:
        gateway-id: ${ORGMEMORY_ASSISTANT_GATEWAY:openai}
        model-id: ${ORGMEMORY_OPENAI_MODEL:gpt-5.6-sol}
      graph-extraction:
        gateway-id: ${ORGMEMORY_GRAPH_EXTRACTION_GATEWAY:openai}
        model-id: ${ORGMEMORY_GRAPH_EXTRACTION_MODEL:${ORGMEMORY_OPENAI_MODEL:gpt-5.6-sol}}
      embedding:
        gateway-id: ${ORGMEMORY_EMBEDDING_GATEWAY:openai}
        model-id: ${ORGMEMORY_OPENAI_EMBEDDING_MODEL:text-embedding-3-large}
  retrieval:
    maximum-results: ${ORGMEMORY_RETRIEVAL_MAXIMUM_RESULTS:20}
    candidate-multiplier: ${ORGMEMORY_RETRIEVAL_CANDIDATE_MULTIPLIER:5}
    maximum-authorized-objects: ${ORGMEMORY_RETRIEVAL_MAXIMUM_AUTHORIZED_OBJECTS:5000}
    maximum-query-length: ${ORGMEMORY_RETRIEVAL_MAXIMUM_QUERY_LENGTH:1000}
    embedding:
      provider: ${ORGMEMORY_EMBEDDING_PROVIDER:openai}
      model: ${ORGMEMORY_OPENAI_EMBEDDING_MODEL:text-embedding-3-large}
      dimensions: ${ORGMEMORY_OPENAI_EMBEDDING_DIMENSIONS:1536}
  ingestion:
    maximum-upload-size: ${ORGMEMORY_MAX_UPLOAD_SIZE:25MB}
    maximum-attempts: ${ORGMEMORY_INGESTION_MAX_ATTEMPTS:5}
  storage:
    object:
      endpoint: ${ORGMEMORY_OBJECT_STORAGE_ENDPOINT:http://localhost:9000}
      access-key: ${ORGMEMORY_OBJECT_STORAGE_ACCESS_KEY:orgmemory-local}
      secret-key: ${ORGMEMORY_OBJECT_STORAGE_SECRET_KEY:orgmemory-local-secret}
      bucket: ${ORGMEMORY_OBJECT_STORAGE_BUCKET:orgmemory-evidence}
      maximum-object-size: ${ORGMEMORY_MAX_UPLOAD_SIZE:25MB}
  security:
    oidc:
      issuer-uri: ${ORGMEMORY_OIDC_ISSUER_URI:http://localhost:8180/realms/orgmemory}
      client-id: ${ORGMEMORY_OIDC_CLIENT_ID:orgmemory-web}
      client-secret: ${ORGMEMORY_OIDC_CLIENT_SECRET:orgmemory-local-dev-only}
      web-base-url: ${ORGMEMORY_WEB_BASE_URL:http://localhost:5173}

server:
  port: ${ORGMEMORY_API_PORT:8080}
  servlet:
    session:
      cookie:
        name: ORGMEMORY_SESSION
        http-only: true
        secure: ${ORGMEMORY_SESSION_COOKIE_SECURE:false}
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info,modulith
