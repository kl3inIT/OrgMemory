spring:
  application:
    name: orgmemory-api
  ai:
    model:
      chat: ${ORGMEMORY_AI_MODEL_CHAT:none}
    openai:
      api-key: ${OPENAI_API_KEY:${ORGMEMORY_OPENAI_API_KEY:}}
      chat:
        model: ${ORGMEMORY_OPENAI_MODEL:gpt-5.5}
  config:
    import: optional:file:.env[.properties],optional:file:../../.env[.properties]
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${ORGMEMORY_DB_URL:jdbc:postgresql://localhost:55432/orgmemory}
    username: ${ORGMEMORY_DB_USER:orgmemory}
    password: ${ORGMEMORY_DB_PASSWORD:orgmemory}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    problemdetails:
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ORGMEMORY_OIDC_ISSUER_URI:http://localhost:8180/realms/orgmemory}

server:
  port: ${ORGMEMORY_API_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,modulith
