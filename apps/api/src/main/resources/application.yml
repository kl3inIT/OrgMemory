spring:
  application:
    name: orgmemory-api
  ai:
    model:
      chat: ${ORGMEMORY_AI_MODEL_CHAT:none}
    openai:
      api-key: ${OPENAI_API_KEY:${ORGMEMORY_OPENAI_API_KEY:}}
      chat:
        model: ${ORGMEMORY_OPENAI_MODEL:gpt-5.5}
  config:
    import: optional:file:.env[.properties],optional:file:../../.env[.properties],optional:file:.openfga.local.properties,optional:file:../../.openfga.local.properties
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${ORGMEMORY_DB_URL:jdbc:postgresql://localhost:55432/orgmemory}
    username: ${ORGMEMORY_DB_USER:orgmemory}
    password: ${ORGMEMORY_DB_PASSWORD:orgmemory}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    problemdetails:
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ORGMEMORY_OIDC_ISSUER_URI:http://localhost:8180/realms/orgmemory}
  session:
    timeout: ${ORGMEMORY_WEB_SESSION_TIMEOUT:8h}
    jdbc:
      initialize-schema: never

orgmemory:
  security:
    oidc:
      issuer-uri: ${ORGMEMORY_OIDC_ISSUER_URI:http://localhost:8180/realms/orgmemory}
      client-id: ${ORGMEMORY_OIDC_CLIENT_ID:orgmemory-web}
      client-secret: ${ORGMEMORY_OIDC_CLIENT_SECRET:orgmemory-local-dev-only}
      web-base-url: ${ORGMEMORY_WEB_BASE_URL:http://localhost:5173}

server:
  port: ${ORGMEMORY_API_PORT:8080}
  servlet:
    session:
      cookie:
        name: ORGMEMORY_SESSION
        http-only: true
        secure: ${ORGMEMORY_SESSION_COOKIE_SECURE:false}
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info,modulith
