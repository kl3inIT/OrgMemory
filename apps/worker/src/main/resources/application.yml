spring:
  application:
    name: orgmemory-worker
  main:
    web-application-type: none
    keep-alive: true
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${ORGMEMORY_DB_URL:jdbc:postgresql://localhost:55432/orgmemory}
    username: ${ORGMEMORY_DB_USER:orgmemory}
    password: ${ORGMEMORY_DB_PASSWORD:orgmemory}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: false
  ai:
    model:
      embedding: ${ORGMEMORY_AI_MODEL_EMBEDDING:none}
    openai:
      api-key: ${OPENAI_API_KEY:${ORGMEMORY_OPENAI_API_KEY:}}
      embedding:
        model: ${ORGMEMORY_OPENAI_EMBEDDING_MODEL:text-embedding-3-large}
        dimensions: ${ORGMEMORY_OPENAI_EMBEDDING_DIMENSIONS:1536}
  config:
    import: optional:file:.env[.properties],optional:file:../../.env[.properties],optional:file:.openfga.local.properties,optional:file:../../.openfga.local.properties

orgmemory:
  authorization:
    convergence:
      scheduling-enabled: ${ORGMEMORY_AUTHORIZATION_CONVERGENCE_ENABLED:true}
      poll-interval: ${ORGMEMORY_AUTHORIZATION_CONVERGENCE_POLL_INTERVAL:5m}
      model-batch-size: ${ORGMEMORY_AUTHORIZATION_CONVERGENCE_MODEL_BATCH_SIZE:50}
      tuple-page-size: ${ORGMEMORY_AUTHORIZATION_CONVERGENCE_TUPLE_PAGE_SIZE:100}
      maximum-tuple-pages: ${ORGMEMORY_AUTHORIZATION_CONVERGENCE_MAXIMUM_TUPLE_PAGES:1000}
  ai:
    gateways:
      openai:
        display-name: OpenAI
        base-url: ${ORGMEMORY_OPENAI_BASE_URL:https://api.openai.com/v1}
        api-key: ${OPENAI_API_KEY:${ORGMEMORY_OPENAI_API_KEY:}}
        capabilities: [CHAT, EMBEDDING]
        timeout: ${ORGMEMORY_AI_GATEWAY_TIMEOUT:60s}
    routes:
      assistant-chat:
        gateway-id: ${ORGMEMORY_ASSISTANT_GATEWAY:openai}
        model-id: ${ORGMEMORY_OPENAI_MODEL:gpt-5.6-sol}
      graph-extraction:
        gateway-id: ${ORGMEMORY_GRAPH_EXTRACTION_GATEWAY:openai}
        model-id: ${ORGMEMORY_GRAPH_EXTRACTION_MODEL:${ORGMEMORY_OPENAI_MODEL:gpt-5.6-sol}}
      embedding:
        gateway-id: ${ORGMEMORY_EMBEDDING_GATEWAY:openai}
        model-id: ${ORGMEMORY_OPENAI_EMBEDDING_MODEL:text-embedding-3-large}
  ingestion:
    maximum-upload-size: ${ORGMEMORY_MAX_UPLOAD_SIZE:25MB}
    maximum-attempts: ${ORGMEMORY_INGESTION_MAX_ATTEMPTS:5}
    processing:
      poll-interval: ${ORGMEMORY_INGESTION_POLL_INTERVAL:2s}
      lease-duration: ${ORGMEMORY_INGESTION_LEASE_DURATION:5m}
      pipeline-version: ${ORGMEMORY_INGESTION_PIPELINE_VERSION:source-pipeline-v1}
      parser-version: ${ORGMEMORY_INGESTION_PARSER_VERSION:spring-ai-etl-v1}
      chunker-version: ${ORGMEMORY_INGESTION_CHUNKER_VERSION:token-800-v1}
      normalizer-version: ${ORGMEMORY_INGESTION_NORMALIZER_VERSION:source-normalizer-v1}
      embedding-provider: ${ORGMEMORY_EMBEDDING_PROVIDER:openai}
      embedding-model: ${ORGMEMORY_OPENAI_EMBEDDING_MODEL:text-embedding-3-large}
      embedding-dimensions: ${ORGMEMORY_OPENAI_EMBEDDING_DIMENSIONS:1536}
      chunk-size: ${ORGMEMORY_INGESTION_CHUNK_SIZE:800}
      maximum-chunks: ${ORGMEMORY_INGESTION_MAX_CHUNKS:500}
  graph-rag:
    indexing:
      scheduling-enabled: ${ORGMEMORY_GRAPH_INDEXING_ENABLED:true}
      poll-interval: ${ORGMEMORY_GRAPH_INDEXING_POLL_INTERVAL:3s}
      lease-duration: ${ORGMEMORY_GRAPH_INDEXING_LEASE_DURATION:10m}
      maximum-concurrency: ${ORGMEMORY_GRAPH_EXTRACTION_CONCURRENCY:4}
      maximum-entities-per-chunk: ${ORGMEMORY_GRAPH_MAX_ENTITIES_PER_CHUNK:40}
      maximum-relations-per-chunk: ${ORGMEMORY_GRAPH_MAX_RELATIONS_PER_CHUNK:60}
  storage:
    object:
      endpoint: ${ORGMEMORY_OBJECT_STORAGE_ENDPOINT:http://localhost:9000}
      access-key: ${ORGMEMORY_OBJECT_STORAGE_ACCESS_KEY:orgmemory-local}
      secret-key: ${ORGMEMORY_OBJECT_STORAGE_SECRET_KEY:orgmemory-local-secret}
      bucket: ${ORGMEMORY_OBJECT_STORAGE_BUCKET:orgmemory-evidence}
      maximum-object-size: ${ORGMEMORY_MAX_UPLOAD_SIZE:25MB}
