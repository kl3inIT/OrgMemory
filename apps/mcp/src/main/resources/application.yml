spring:
  application:
    name: orgmemory-mcp
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${ORGMEMORY_DB_URL:jdbc:postgresql://localhost:55432/orgmemory}
    username: ${ORGMEMORY_DB_USER:orgmemory}
    password: ${ORGMEMORY_DB_PASSWORD:orgmemory}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: false
  ai:
    mcp:
      server:
        name: orgmemory
        version: 0.1.0
        protocol: STREAMABLE
        instructions: >-
          OrgMemory is an AI Capability Registry for approved organizational
          prompts, workflows, agent configurations, and handover knowledge.

server:
  port: ${ORGMEMORY_MCP_PORT:8081}
