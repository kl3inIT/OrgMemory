services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/orgmemory-realm.json:/opt/keycloak/data/import/orgmemory-realm.json:ro

  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: orgmemory
      POSTGRES_USER: orgmemory
      POSTGRES_PASSWORD: orgmemory
    ports:
      - "55432:5432"
    volumes:
      - orgmemory_pg:/var/lib/postgresql
    labels:
      org.springframework.boot.service-connection: postgres

volumes:
  orgmemory_pg:
