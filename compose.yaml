services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      ORGMEMORY_OIDC_CLIENT_SECRET: ${ORGMEMORY_OIDC_CLIENT_SECRET:-orgmemory-local-dev-only}
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/orgmemory-realm.json:/opt/keycloak/data/import/orgmemory-realm.json:ro

  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: orgmemory
      POSTGRES_USER: orgmemory
      POSTGRES_PASSWORD: orgmemory
    ports:
      - "55432:5432"
    volumes:
      - orgmemory_pg:/var/lib/postgresql
    labels:
      org.springframework.boot.service-connection: postgres

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${ORGMEMORY_OBJECT_STORAGE_ACCESS_KEY:-orgmemory-local}
      MINIO_ROOT_PASSWORD: ${ORGMEMORY_OBJECT_STORAGE_SECRET_KEY:-orgmemory-local-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - orgmemory_minio:/data

  openfga-postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: openfga
      POSTGRES_USER: openfga
      POSTGRES_PASSWORD: openfga
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfga -d openfga"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - openfga_pg:/var/lib/postgresql

  openfga-migrate:
    image: openfga/openfga:v1.18.1
    command:
      - migrate
      - --datastore-engine
      - postgres
      - --datastore-uri
      - postgres://openfga:openfga@openfga-postgres:5432/openfga?sslmode=disable
    depends_on:
      openfga-postgres:
        condition: service_healthy

  openfga:
    image: openfga/openfga:v1.18.1
    command:
      - run
      - --datastore-engine
      - postgres
      - --datastore-uri
      - postgres://openfga:openfga@openfga-postgres:5432/openfga?sslmode=disable
      - --playground-enabled=false
    ports:
      - "8081:8080"
      - "8082:8081"
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully

volumes:
  orgmemory_pg:
  openfga_pg:
  orgmemory_minio:
