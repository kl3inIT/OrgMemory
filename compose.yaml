services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      ORGMEMORY_OIDC_CLIENT_SECRET: ${ORGMEMORY_OIDC_CLIENT_SECRET:-orgmemory-local-dev-only}
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/orgmemory-realm.json:/opt/keycloak/data/import/orgmemory-realm.json:ro

  postgres:
    image: orgmemory/postgres-rag:pg18-age1.7.0-pgvector0.8.2
    build:
      context: .
      dockerfile: infrastructure/postgres-rag/Dockerfile
    environment:
      POSTGRES_DB: orgmemory
      POSTGRES_USER: orgmemory
      POSTGRES_PASSWORD: orgmemory
      OPENFGA_POSTGRES_DB: openfga
      OPENFGA_POSTGRES_USER: openfga
      OPENFGA_POSTGRES_PASSWORD: openfga
    ports:
      - "55432:5432"
    volumes:
      - orgmemory_pg:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U orgmemory -d orgmemory && psql -U orgmemory -d orgmemory -Atqc \"SELECT count(*) = 2 FROM pg_extension WHERE extname IN ('age', 'vector')\" | grep -qx t",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    labels:
      org.springframework.boot.service-connection: postgres

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${ORGMEMORY_OBJECT_STORAGE_ACCESS_KEY:?Set ORGMEMORY_OBJECT_STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${ORGMEMORY_OBJECT_STORAGE_SECRET_KEY:?Set ORGMEMORY_OBJECT_STORAGE_SECRET_KEY}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - orgmemory_minio:/data

  postgres-openfga-bootstrap:
    image: orgmemory/postgres-rag:pg18-age1.7.0-pgvector0.8.2
    entrypoint: ["/docker-entrypoint-initdb.d/01-create-openfga-database.sh"]
    environment:
      POSTGRES_DB: orgmemory
      POSTGRES_USER: orgmemory
      PGPASSWORD: orgmemory
      PGHOST: postgres
      OPENFGA_POSTGRES_DB: openfga
      OPENFGA_POSTGRES_USER: openfga
      OPENFGA_POSTGRES_PASSWORD: openfga
    depends_on:
      postgres:
        condition: service_healthy

  openfga-migrate:
    image: openfga/openfga:v1.18.1
    command:
      - migrate
      - --datastore-engine
      - postgres
      - --datastore-uri
      - postgres://openfga:openfga@postgres:5432/openfga?sslmode=disable
    depends_on:
      postgres-openfga-bootstrap:
        condition: service_completed_successfully

  openfga:
    image: openfga/openfga:v1.18.1
    command:
      - run
      - --datastore-engine
      - postgres
      - --datastore-uri
      - postgres://openfga:openfga@postgres:5432/openfga?sslmode=disable
      - --playground-enabled=false
    ports:
      - "8081:8080"
      - "8082:8081"
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully

volumes:
  orgmemory_pg:
  orgmemory_minio:
