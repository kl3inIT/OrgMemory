name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - light-rag
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · Java 25
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v5.6.0
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Build PostgreSQL GraphRAG test image
        run: >-
          docker build
          --file infrastructure/postgres-rag/Dockerfile
          --tag orgmemory/postgres-rag:pg18-age1.7.0-pgvector0.8.2
          .

      - name: Run backend test suite
        run: ./gradlew --no-daemon clean build

  web:
    name: Web · Node 24
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated API client
        run: pnpm check:api

      - name: Type-check
        run: pnpm typecheck

      - name: Build production bundle
        run: pnpm build

      - name: Check generated route tree
        run: git diff --exit-code -- src/routeTree.gen.ts

  openfga:
    name: OpenFGA model
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false

      - name: Install OpenFGA CLI
        uses: jaxxstorm/action-install-gh-release@v3.0.0
        with:
          repo: openfga/cli
          tag: v0.7.19
          cache: enable

      - name: Test authorization model
        working-directory: integrations/authorization-openfga/src/test/openfga
        run: fga model test --tests store.fga.yaml

  gate:
    name: CI Gate
    if: always()
    needs:
      - backend
      - web
      - openfga
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every verification job to pass
        shell: bash
        env:
          BACKEND_RESULT: ${{ needs.backend.result }}
          WEB_RESULT: ${{ needs.web.result }}
          OPENFGA_RESULT: ${{ needs.openfga.result }}
        run: |
          set -euo pipefail
          [[ "$BACKEND_RESULT" == "success" ]]
          [[ "$WEB_RESULT" == "success" ]]
          [[ "$OPENFGA_RESULT" == "success" ]]
