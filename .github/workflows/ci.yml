name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · Java 25
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Run backend test suite
        run: ./gradlew --no-daemon clean build

  web:
    name: Web · Node 24
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm typecheck

      - name: Build production bundle
        run: pnpm build

  openfga:
    name: OpenFGA model
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Test authorization model
        uses: openfga/action-openfga-test@e89aa8259796cd5ee5c1b1ae7d72c401029cb947 # v0.1.2
        with:
          test_path: integrations/authorization-openfga/src/test/openfga/store.fga.yaml
          fga_cli_version: v0.7.19

  gate:
    name: CI Gate
    if: always()
    needs:
      - backend
      - web
      - openfga
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every verification job to pass
        shell: bash
        env:
          BACKEND_RESULT: ${{ needs.backend.result }}
          WEB_RESULT: ${{ needs.web.result }}
          OPENFGA_RESULT: ${{ needs.openfga.result }}
        run: |
          set -euo pipefail
          [[ "$BACKEND_RESULT" == "success" ]]
          [[ "$WEB_RESULT" == "success" ]]
          [[ "$OPENFGA_RESULT" == "success" ]]
