version: 2

updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Asia/Bangkok"
    open-pull-requests-limit: 999
    commit-message:
      prefix: "deps"
    groups:
      gradle-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:15"
      timezone: "Asia/Bangkok"
    open-pull-requests-limit: 999
    commit-message:
      prefix: "deps(web)"
    groups:
      web-production-minor-and-patch:
        applies-to: "version-updates"
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      web-development-minor-and-patch:
        applies-to: "version-updates"
        dependency-type: "development"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "Asia/Bangkok"
    open-pull-requests-limit: 999
    commit-message:
      prefix: "deps(actions)"
    groups:
      actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:45"
      timezone: "Asia/Bangkok"
    open-pull-requests-limit: 999
    commit-message:
      prefix: "deps(compose)"
    groups:
      compose-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
